name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r apps/api/requirements-api.txt
          pip install -r examples/console-ui/requirements-recorder.txt
          pip install -e ".[api]"
          pip install pip-audit

      - name: Syntax check
        run: |
          python -m py_compile apps/api/app/main.py
          python -m py_compile examples/console-ui/synthesize_and_save.py
          python -m py_compile omnivoice/api/settings.py

      - name: Dependency vulnerability audit
        run: |
          pip-audit -r apps/api/requirements-api.txt

  nuget-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Pack OmniVoice.Client
        run: |
          dotnet pack libraries/OmniVoice.Client/src/OmniVoice.Client/OmniVoice.Client.csproj -c Release -o "${{ runner.temp }}/nupkg"

  maui-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install MAUI workloads
        run: |
          dotnet workload install maui-android maui-windows

      - name: Restore
        run: |
          dotnet restore examples/maui/OmniVoiceApi.Maui/OmniVoiceApi.Maui.csproj

      - name: Build Windows target
        run: |
          dotnet build examples/maui/OmniVoiceApi.Maui/OmniVoiceApi.Maui.csproj -f net9.0-windows10.0.19041.0 --no-restore

      - name: Build Android target
        run: |
          dotnet build examples/maui/OmniVoiceApi.Maui/OmniVoiceApi.Maui.csproj -f net9.0-android --no-restore

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Docker build check
        run: |
          docker build -f infra/docker/Dockerfile -t omnivoice-api:ci .
